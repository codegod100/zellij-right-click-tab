name: FlakeHub CI

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v?[0-9]+.[0-9]+.[0-9]+*"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: DeterminateSystems/determinate-nix-action@v3

      - uses: DeterminateSystems/flakehub-cache-action@v3

      - name: Build patched zellij
        run: nix build .#zellij -L

      - name: Build tab-bar plugin
        run: nix build .#tab-bar-right-close -L

      - name: Build default (zellij + plugin)
        run: nix build .#default -L
